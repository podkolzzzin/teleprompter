name: Deploy PeerJS Worker

on:
  push:
    branches: [main]
    paths:
      - workers/peerjs/**
      - wrangler.toml
      - package.json
      - package-lock.json
      - tsconfig.worker.json
      - .github/workflows/deploy-peerjs-worker.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy PeerJS Worker
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:worker
      - name: Deploy Worker
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: npm run worker:deploy
      - name: Skip Worker deploy
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: echo "Cloudflare secrets are not configured; skipping Worker deploy."
